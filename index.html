<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinera 2026 - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; overflow: hidden;
            background-color: #e0f2fe;
        }
        
        .bg-sky-pattern {
            background-image: radial-gradient(#bae6fd 0.8px, transparent 0.8px);
            background-size: 24px 24px;
        }

        .photo-blend {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 85%; 
            z-index: 0;
            mask-image: linear-gradient(to bottom, 
                black 0%, 
                black 35%, 
                rgba(0,0,0,0.4) 65%, 
                transparent 95%
            );
            -webkit-mask-image: linear-gradient(to bottom, 
                black 0%, 
                black 35%, 
                rgba(0,0,0,0.4) 65%, 
                transparent 95%
            );
        }

        .radial-glow {
            position: absolute;
            bottom: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 180%;
            height: 90%;
            background: radial-gradient(ellipse at center, 
                rgba(255, 255, 255, 1) 0%, 
                rgba(224, 242, 254, 0.95) 40%, 
                rgba(224, 242, 254, 0) 75%
            );
            z-index: 1;
        }
    </style>
</head>
<body class="font-sans text-blue-950 bg-sky-pattern">

    <div class="h-full w-full relative flex flex-col justify-end items-center">
        
        <div class="photo-blend">
            <img src="foto_sinera.JPG" alt="Sinera 2026" 
                 class="w-full h-full object-cover object-top opacity-100">
        </div>

        <div class="radial-glow"></div>

        <div class="relative z-10 w-full flex flex-col items-center pb-12 px-8 text-center">
            
            <div class="mb-10">
                <h1 class="text-2xl md:text-4xl font-extrabold leading-tight mb-4 text-blue-950" 
                    style="text-shadow: 0 0 25px white, 0 0 10px white;">
                    Halo Teman-Teman Sinera, <br>
                    Selamat Datang di Laman Pembayaran Kas Sinera!
                </h1>
                <p class="text-[10px] md:text-xs text-blue-600 font-black uppercase tracking-[6px]">
                    Silahkan pilih opsi berikut:
                </p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-md">
                
                <a href="page_peraturan.html" class="bg-white border border-blue-100 p-4 rounded-2xl font-bold text-blue-700 shadow-sm hover:bg-blue-50 transition-all flex items-center justify-center">
                    Peraturan Pembayaran
                </a>

                <a href="page_bayar.html" class="bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-blue-300 hover:bg-blue-700 transition-all flex items-center justify-center">
                    Bayar Kas
                </a>
                
            </div>
            
            <div class="h-6"></div>
        </div>
    </div>

</body>
</html>
